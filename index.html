<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>حاول</title>
    <style>
        /* ===== RESET & BASE ===== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
        }

        body {
            background: #06060e;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
            overflow: hidden;
            position: relative;
        }

        /* ===== خلفية نيون متحركة ===== */
        .bg-glow {
            position: fixed;
            inset: 0;
            z-index: 0;
            background:
                radial-gradient(ellipse at 20% 30%, rgba(120, 40, 255, 0.08) 0%, transparent 20%),
                radial-gradient(ellipse at 80% 70%, rgba(0, 150, 255, 0.06) 0%, transparent 20%),
                radial-gradient(ellipse at 20% 100%, rgba(180, 60, 255, 0.05) 0%, transparent 40%);
            animation: bgPulse 8s ease-in-out infinite alternate;
        }

        @keyframes bgPulse {
            0% { opacity: 0.6; transform: scale(1); }
            100% { opacity: 1; transform: scale(1.05); }
        }

        /* ===== جسيمات ذكية ===== */
        .particles {
            position: fixed;
            inset: 0;
            z-index: 0;
            pointer-events: none;
            overflow: hidden;
        }

        .particle {
            position: absolute;
            border-radius: 20%;
            background: radial-gradient(circle, rgba(167, 139, 250, 0.4), transparent);
            animation: floatUp linear infinite;
            opacity: 0;
        }

        .particle:nth-child(1) { width: 5px; height: 5px; left: 8%; animation-duration: 12s; animation-delay: 0s; }
        .particle:nth-child(2) { width: 8px; height: 8px; left: 22%; animation-duration: 16s; animation-delay: 2s; }
        .particle:nth-child(3) { width: 4px; height: 4px; left: 40%; animation-duration: 14s; animation-delay: 4s; }
        .particle:nth-child(4) { width: 7px; height: 7px; left: 58%; animation-duration: 18s; animation-delay: 1s; }
        .particle:nth-child(5) { width: 5px; height: 5px; left: 75%; animation-duration: 13s; animation-delay: 3s; }
        .particle:nth-child(6) { width: 9px; height: 9px; left: 88%; animation-duration: 20s; animation-delay: 5s; }
        .particle:nth-child(7) { width: 6px; height: 6px; left: 32%; animation-duration: 17s; animation-delay: 7s; }
        .particle:nth-child(8) { width: 4px; height: 4px; left: 20%; animation-duration: 15s; animation-delay: 2s; }
        .particle:nth-child(9) { width: 7px; height: 7px; left: 68%; animation-duration: 19s; animation-delay: 6s; }
        .particle:nth-child(10) { width: 5px; height: 5px; left: 95%; animation-duration: 14s; animation-delay: 8s; }

        @keyframes floatUp {
            0% { transform: translateY(100vh) scale(0); opacity: 0; }
            10% { opacity: 0.6; }
            90% { opacity: 0.6; }
            100% { transform: translateY(-10vh) scale(1.5); opacity: 0; }
        }

        /* ===== البطاقة ===== */
        .card {
            background: rgba(8, 8, 18, 0.92);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            max-width: 460px;
            width: 100%;
            padding: 48px 36px 36px;
            border-radius: 44px;
            text-align: center;
            border: 1px solid rgba(120, 60, 255, 0.08);
            box-shadow:
                0 0 80px rgba(100, 40, 255, 0.04),
                0 0 160px rgba(0, 100, 255, 0.02),
                inset 0 0 80px rgba(100, 40, 255, 0.02);
            position: relative;
            z-index: 1;
            animation: cardEntry 0.9s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

        @keyframes cardEntry {
            0% { opacity: 0; transform: translateY(50px) scale(0.94); }
            100% { opacity: 1; transform: translateY(0) scale(1); }
        }

        .card::before {
            content: '';
            position: absolute;
            inset: -2px;
            border-radius: 45px;
            padding: 2px;
            background: linear-gradient(
                135deg,
                rgba(120, 40, 255, 0.2),
                rgba(0, 150, 255, 0.08),
                rgba(180, 60, 255, 0.15)
            );
            background-size: 300% 300%;
            -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
            -webkit-mask-composite: xor;
            mask-composite: exclude;
            pointer-events: none;
            animation: borderFlow 5s ease-in-out infinite alternate;
        }

        @keyframes borderFlow {
            0% { background-position: 0% 0%; opacity: 0.4; }
            100% { background-position: 100% 100%; opacity: 1; }
        }

        /* ===== الصورة الدائرية ===== */
        .app-icon {
            width: 160px;
            height: 160px;
            border-radius: 20%;
            margin: 0 auto 24px;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            background: linear-gradient(145deg, #15102a, #0a0818);
            border: 2px solid rgba(120, 60, 255, 0.15);
            box-shadow:
                0 0 60px rgba(100, 40, 255, 0.08),
                0 0 120px rgba(100, 40, 255, 0.03);
            position: relative;
            transition: all 0.5s cubic-bezier(0.23, 1, 0.32, 1);
        }

        .app-icon:hover {
            border-color: rgba(160, 100, 255, 0.35);
            box-shadow: 0 0 80px rgba(100, 40, 255, 0.15), 0 0 160px rgba(100, 40, 255, 0.05);
            transform: scale(1.03);
        }

        .app-icon img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
            border-radius: 20%;
        }

        /* ===== حلقة نيون ===== */
        .app-icon::before {
            content: '';
            position: absolute;
            inset: -5px;
            border-radius: 20%;
            border: 1.5px solid transparent;
            background: conic-gradient(
                from 0deg,
                transparent,
                rgba(120, 40, 255, 0.15),
                rgba(0, 150, 255, 0.15),
                rgba(180, 60, 255, 0.15),
                transparent
            );
            -webkit-mask: radial-gradient(farthest-side, transparent calc(100% - 2.5px), #fff calc(100% - 2.5px));
            mask: radial-gradient(farthest-side, transparent calc(100% - 2.5px), #fff calc(100% - 2.5px));
            animation: spinRing 6s linear infinite;
            pointer-events: none;
        }

        @keyframes spinRing {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .app-icon::after {
            content: '';
            position: absolute;
            inset: -10px;
            border-radius: 20%;
            background: radial-gradient(circle at 20% 20%, rgba(120, 40, 255, 0.05), transparent 70%);
            animation: pulseGlow 3s ease-in-out infinite alternate;
            pointer-events: none;
        }

        @keyframes pulseGlow {
            0% { transform: scale(0.9); opacity: 0.3; }
            100% { transform: scale(1.15); opacity: 0.8; }
        }

        /* ===== النص ===== */
        h1 {
            font-size: 32px;
            font-weight: 800;
            background: linear-gradient(135deg, #a78bfa, #60a5fa, #a78bfa);
            background-size: 300% 300%;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: gradShift 4s ease-in-out infinite alternate;
            margin-bottom: 6px;
            letter-spacing: -0.5px;
        }

        @keyframes gradShift {
            0% { background-position: 0% 20%; }
            100% { background-position: 100% 20%; }
        }

        .sub {
            color: #94a3b8;
            font-size: 15px;
            margin-bottom: 36px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            flex-wrap: wrap;
        }

        .sub span {
            color: #a78bfa;
            font-weight: 500;
            background: rgba(120, 60, 255, 0.06);
            padding: 2px 16px;
            border-radius: 30px;
            border: 1px solid rgba(120, 60, 255, 0.04);
        }

        @keyframes dotPulse {
            0%, 100% { opacity: 0.3; transform: scale(0.8); }
            50% { opacity: 1; transform: scale(1.2); }
        }

        /* ===== زر التحميل ===== */
        .btn {
            display: block;
            width: 100%;
            padding: 20px 28px;
            background: linear-gradient(135deg, #7c3aed, #4f46e5);
            color: #fff;
            border: none;
            border-radius: 60px;
            font-size: 20px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.4s cubic-bezier(0.23, 1, 0.32, 1);
            box-shadow: 0 4px 30px rgba(100, 40, 255, 0.2), 0 0 60px rgba(100, 40, 255, 0.03);
            position: relative;
            overflow: hidden;
            letter-spacing: 0.3px;
            text-decoration: none;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .btn::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: conic-gradient(from 0deg, transparent, rgba(255, 255, 255, 0.03), transparent 60%);
            animation: btnShine 5s linear infinite;
            pointer-events: none;
        }

        @keyframes btnShine {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .btn::after {
            content: '';
            position: absolute;
            inset: -2px;
            border-radius: 62px;
            background: linear-gradient(135deg, rgba(120, 40, 255, 0.2), rgba(0, 150, 255, 0.05));
            filter: blur(12px);
            opacity: 0;
            transition: 0.5s ease;
            z-index: -1;
        }

        .btn:hover:not(:disabled)::after {
            opacity: 1;
        }

        .btn:hover:not(:disabled) {
            transform: translateY(-3px) scale(1.01);
            box-shadow: 0 8px 40px rgba(100, 40, 255, 0.3), 0 0 80px rgba(100, 40, 255, 0.06);
            background: linear-gradient(135deg, #8b5cf6, #6366f1);
        }

        .btn:active:not(:disabled) {
            transform: scale(0.96);
        }

        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        /* ===== زر التلجرام ===== */
        .telegram-btn {
            background: linear-gradient(135deg, #1e90ff, #1c86ee);
            margin-top: 16px;
        }

        .telegram-btn:hover:not(:disabled) {
            background: linear-gradient(135deg, #1ca3ff, #1e90ff);
        }

        /* ===== رسالة الحالة ===== */
        .status-msg {
            margin-top: 18px;
            font-size: 14px;
            min-height: 28px;
            font-weight: 500;
            padding: 6px 16px;
            border-radius: 40px;
            display: inline-block;
            width: 100%;
            transition: all 0.4s ease;
        }

        /* ===== التذييل ===== */
        .footer {
            margin-top: 32px;
            border-top: 1px solid rgba(100, 60, 255, 0.04);
            padding-top: 24px;
            display: flex;
            justify-content: center;
            gap: 24px;
            flex-wrap: wrap;
        }

        .footer span {
            display: flex;
            align-items: center;
            gap: 8px;
            color: #6b7280;
            font-size: 13px;
            transition: all 0.3s ease;
            cursor: default;
        }

        .footer span:hover {
            color: #a78bfa;
            transform: translateY(-1px);
        }

        /* ===== RESPONSIVE ===== */
        @media (max-width: 520px) {
            .card { padding: 32px 20px 24px; border-radius: 32px; }
            .app-icon { width: 130px; height: 130px; }
            h1 { font-size: 26px; }
            .sub { font-size: 13px; gap: 6px; }
            .btn { font-size: 17px; padding: 16px 20px; }
            .footer { gap: 14px; }
            .footer span { font-size: 12px; }
        }

        @media (max-width: 380px) {
            .app-icon { width: 110px; height: 110px; }
            h1 { font-size: 22px; }
            .card { padding: 24px 16px 18px; }
        }
    </style>
</head>
<body>

    <!-- خلفية -->
    <div class="bg-glow"></div>

    <!-- جسيمات -->
    <div class="particles">
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
    </div>

    <!-- البطاقة -->
    <div class="card">

        <div class="app-icon">
            <img src="https://files.catbox.moe/a0txw4.png" alt=" " />
        </div>

        <h1>حاول</h1>

        <div class="sub">
            <span>الإصدار 6</span>
            <span>ك.ب 596</span>
        </div>

        <button class="btn" id="downloadBtn">📥 تحميل</button>

        <!-- زر جروب التلجرام -->
        <a href="https://t.me/PlayNow_1" target="_blank" rel="noopener noreferrer" class="btn telegram-btn" id="telegramBtn">
            ✈️ جروب تلجرام
        </a>

        <div id="statusMsg"></div>

    </div>

    <script>
        (function() {
            const btn = document.getElementById('downloadBtn');
            const msg = document.getElementById('statusMsg');

            const DOWNLOAD_URL = 'https://files.catbox.moe/69vs0k.apk';
            const FILE_NAME = 'حاول اصدار 7.apk';

            function isOnline() { return navigator.onLine; }

            function setStatus(text, isError = true) {
                msg.textContent = text;
                msg.style.color = isError ? '#f87171' : '#6ee7b7';
                msg.style.background = isError ? 'rgba(248,113,113,0.04)' : 'rgba(110,231,183,0.04)';
                msg.style.border = isError ? '1px solid rgba(248,113,113,0.06)' : '1px solid rgba(110,231,183,0.06)';
            }

            function clearStatus(ms = 4000) {
                setTimeout(() => {
                    msg.textContent = '';
                    msg.style.background = 'transparent';
                    msg.style.border = 'none';
                }, ms);
            }

            function downloadFile(url, filename) {
                fetch(url)
                    .then(res => {
                        if (!res.ok) throw new Error(`HTTP ${res.status}`);
                        return res.blob();
                    })
                    .then(blob => {
                        const link = document.createElement('a');
                        link.href = URL.createObjectURL(blob);
                        link.download = filename;
                        document.body.appendChild(link);
                        link.click();
                        document.body.removeChild(link);
                        URL.revokeObjectURL(link.href);
                        btn.disabled = false;
                        btn.innerHTML = '✅ تم التحميل';
                        clearStatus(3000);
                    })
                    .catch(err => {
                        console.error(err);
                        btn.disabled = false;
                        btn.innerHTML = '❌ خطأ . حاول مرة أخرى';
                        clearStatus(4000);
                    });
            }

            btn.addEventListener('click', function() {
                if (!isOnline()) {
                    btn.innerHTML = '⚠️ لا يوجد اتصال انترنت';
                    clearStatus(4000);
                    return;
                }

                this.disabled = true;
                btn.innerHTML = '⏳ جاري التحميل...', false;

                downloadFile(DOWNLOAD_URL, FILE_NAME);
            });

            window.addEventListener('offline', () => {
                if (!btn.disabled) {
                    btn.innerHTML = '⚠️ انقطع اتصال الانترنت';
                    clearStatus(3000);
                }
            });

            window.addEventListener('online', () => {
                btn.innerHTML = '✅ تم استعادة الاتصال', false;
                clearStatus(2000);
            });

            console.log('✅ رابط التحميل:', DOWNLOAD_URL);
        })();
    </script>

</body>
</html>
