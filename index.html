<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>حاول</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', system-ui, -apple-system, sans-serif; }
        body { background: #06060e; display: flex; justify-content: center; align-items: center; min-height: 100vh; padding: 20px; }
        .card { background: rgba(8, 8, 18, 0.92); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); max-width: 460px; width: 100%; padding: 48px 36px 36px; border-radius: 44px; text-align: center; border: 1px solid rgba(120, 60, 255, 0.08); box-shadow: 0 0 80px rgba(100, 40, 255, 0.04); position: relative; z-index: 1; }
        .app-icon { width: 160px; height: 160px; border-radius: 30px; margin: 0 auto 24px; display: flex; align-items: center; justify-content: center; overflow: hidden; background: #0a0818; border: 2px solid rgba(120, 60, 255, 0.15); }
        .app-icon img { width: 100%; height: 100%; object-fit: cover; display: block; border-radius: 28px; }
        h1 { font-size: 32px; font-weight: 800; background: linear-gradient(135deg, #a78bfa, #60a5fa); -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin-bottom: 6px; }
        .sub { color: #94a3b8; font-size: 15px; margin-bottom: 36px; display: flex; align-items: center; justify-content: center; gap: 10px; flex-wrap: wrap; }
        .sub span { color: #a78bfa; font-weight: 500; background: rgba(120, 60, 255, 0.06); padding: 2px 16px; border-radius: 30px; border: 1px solid rgba(120, 60, 255, 0.04); }
        .btn { display: block; width: 100%; padding: 20px 28px; background: linear-gradient(135deg, #7c3aed, #4f46e5); color: #fff; border: none; border-radius: 60px; font-size: 20px; font-weight: 700; cursor: pointer; transition: all 0.3s ease; text-decoration: none; text-align: center; margin-top: 16px; }
        .btn:hover { transform: translateY(-2px); background: linear-gradient(135deg, #8b5cf6, #6366f1); }
        .telegram-btn { background: linear-gradient(135deg, #1e90ff, #1c86ee); }
        .telegram-btn:hover { background: linear-gradient(135deg, #1ca3ff, #1e90ff); }
        @media (max-width: 520px) { .card { padding: 32px 20px 24px; border-radius: 32px; } .app-icon { width: 130px; height: 130px; border-radius: 24px; } .app-icon img { border-radius: 22px; } h1 { font-size: 26px; } .btn { font-size: 17px; padding: 16px 20px; } }
        @media (max-width: 380px) { .app-icon { width: 110px; height: 110px; border-radius: 20px; } .app-icon img { border-radius: 18px; } h1 { font-size: 22px; } .card { padding: 24px 16px 18px; } }
    </style>
</head>
<body>
    <div class="card">
        <div class="app-icon">
            <img src="https://images.iimg.live/images/radiant-image-3825.webp" />
        </div>
        <h1>حاول</h1>
        <div class="sub">
            <span>الإصدار 10</span>
            <span>م.ب 1</span>
        </div>
        <button class="btn" onclick="downloadFile()">📥 تحميل</button>
        <a href="https://t.me/+VldkspTc7OVjNjdk" target="_blank" rel="noopener noreferrer" class="btn telegram-btn">✈️ جروب تلجرام</a>
    </div>

    <script>
        async function downloadFile() {
            const url = 'https://files.catbox.moe/dczb3b.apk';
            const fileName = 'حاول.apk';
            
            try {
                const response = await fetch(url);
                const blob = await response.blob();
                const link = document.createElement('a');
                link.href = URL.createObjectURL(blob);
                link.download = fileName;
                document.body.appendChild(link);
                link.click();
                document.body.removeChild(link);
                URL.revokeObjectURL(link.href);
            } catch (error) {
                window.open(url, '_blank');
            }
        }
    </script>
</body>
</html>
